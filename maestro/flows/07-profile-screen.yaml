---
# Screenshot: Profile / You Screen
- launchApp:
    clearState: true
- waitForAnimationToEnd

# Login
- tapOn: "Email"
- inputText: "preview.lana@brdg.local"
- tapOn: "Password"
- inputText: "PreviewPass123!"
- hideKeyboard
- tapOn: "Sign in"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Discover"
    timeout: 15000

# Navigate to You tab
- tapOn: "You"
- waitForAnimationToEnd
- takeScreenshot: screenshots/07-profile-screen
