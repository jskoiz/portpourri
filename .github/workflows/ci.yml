name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-migration-rehearsal:
    name: Backend migration rehearsal
    runs-on: [self-hosted, Linux, X64, brdg-vps]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: brdg_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d brdg_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - run: npm ci
      - run: npm ci
        working-directory: backend
      - run: npm run rehearse:backend:legacy-migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/brdg_ci

  fast-pr:
    name: PR fast lane
    runs-on: [self-hosted, Linux, X64, brdg-vps]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json
      - run: npm install --ignore-scripts
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: |
          git fetch origin main --depth=1
          node ./scripts/run-harness-lane.mjs --lane pr-fast --artifacts-dir artifacts/harness/pr-fast --base origin/main --head HEAD
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: harness-pr-fast
          path: artifacts/harness/pr-fast

  main-check:
    name: Main check lane
    runs-on: [self-hosted, Linux, X64, brdg-vps]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json
      - run: npm install --ignore-scripts
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: node ./scripts/run-harness-lane.mjs --lane main-check --artifacts-dir artifacts/harness/main-check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: harness-main-check
          path: artifacts/harness/main-check

  release-readiness:
    name: Release readiness
    runs-on: [self-hosted, Linux, X64, brdg-vps]
    env:
      EXPO_PUBLIC_API_URL: https://api.example.invalid
      IOS_BUNDLE_IDENTIFIER: com.avmillabs.brdg
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json
      - run: npm install --ignore-scripts
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: npm run check
      - run: npm run repo:index:check
      - run: ./scripts/release-ios.sh --phase prepare --mode xcode --dry-run-build-number
