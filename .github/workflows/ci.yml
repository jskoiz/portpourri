name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fast-pr:
    name: PR fast lane
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: git fetch origin "${GITHUB_BASE_REF}" --depth=1
      - run: node ./scripts/run-harness-lane.mjs --lane pr-fast --artifacts-dir artifacts/harness/pr-fast --base "origin/${GITHUB_BASE_REF}" --head HEAD
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: harness-pr-fast
          path: artifacts/harness/pr-fast

  full-main:
    name: Main full lane
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: node ./scripts/run-harness-lane.mjs --lane full-main --artifacts-dir artifacts/harness/full-main
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: harness-full-main
          path: artifacts/harness/full-main
