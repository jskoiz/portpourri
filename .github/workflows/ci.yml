name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fast-pr:
    name: PR fast lane
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: git fetch origin "${GITHUB_BASE_REF}" --depth=1
      - run: npm run check:changed -- --base "origin/${GITHUB_BASE_REF}" --head HEAD

  full-main:
    name: Main full lane
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            mobile/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm ci
        working-directory: mobile
      - run: npm run check
      - run: npm run smoke
